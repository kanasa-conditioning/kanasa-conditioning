<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — KANASA Conditioning Studio</title>
  <meta name="description" content="KANASA Conditioning Studioへのお問合せ。紹介制・完全プライベートスタジオ。">
  <link rel="canonical" href="https://kanasa-conditioning.com/contact/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500;600&family=Noto+Serif+JP:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header" role="banner">
    <div class="header__inner">
      <a href="/" class="header__logo" aria-label="KANASA Conditioning Studio トップページ">
        <img src="../kanasa_logo_yoko.png" alt="KANASA Conditioning Studio" width="200" height="48">
      </a>
      <nav class="header__nav" aria-label="メインナビゲーション">
        <a href="/#introduction" class="header__nav-link">Concept</a>
        <a href="/method/" class="header__nav-link">Method</a>
        <a href="/#profile" class="header__nav-link">Profile</a>
        <a href="/price/" class="header__nav-link">Price</a>
        <a href="/journal/" class="header__nav-link">Blog</a>
        <a href="/#voice" class="header__nav-link">Voice</a>
        <a href="/#faq" class="header__nav-link">FAQ</a>
        <a href="/contact/" class="header__cta">お問合せ</a>
      </nav>
      <button class="header__hamburger" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" aria-label="モバイルナビゲーション">
    <a href="/#introduction" class="mobile-nav__link">Concept</a>
    <a href="/method/" class="mobile-nav__link">Method</a>
    <a href="/#profile" class="mobile-nav__link">Profile</a>
    <a href="/price/" class="mobile-nav__link">Price</a>
    <a href="/journal/" class="mobile-nav__link">Blog</a>
    <a href="/#voice" class="mobile-nav__link">Voice</a>
    <a href="/#faq" class="mobile-nav__link">FAQ</a>
    <a href="/contact/" class="mobile-nav__link">Contact</a>
  </nav>

  <main>

    <!-- PAGE HERO -->
    <section class="section" style="padding-top: clamp(160px, 20vh, 240px);" aria-label="お問合せ">
      <div class="container">
        <div class="section-header reveal">
          <p class="section-header__label">Contact</p>
          <h1 class="section-header__title">お問合せ</h1>
        </div>
      </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="section" aria-label="お問合せフォーム">
      <div class="container">
        <div class="contact__form reveal">
          <form action="https://formsubmit.co/info@kanasa-conditioning.com" method="POST">
            <input type="hidden" name="_subject" value="【KANASA】お問合せがありました">
            <input type="hidden" name="_captcha" value="false">

            <div class="form__group">
              <label class="form__label" for="name">
                お名前
                <span class="form__required">※必須</span>
              </label>
              <input
                class="form__input"
                type="text"
                id="name"
                name="name"
                placeholder="例：山田 太郎"
                required
                autocomplete="name"
              >
            </div>

            <div class="form__group">
              <label class="form__label" for="email">
                メールアドレス
                <span class="form__required">※必須</span>
              </label>
              <input
                class="form__input"
                type="email"
                id="email"
                name="email"
                placeholder="例：example@email.com"
                required
                autocomplete="email"
              >
            </div>

            <div class="form__group">
              <label class="form__label" for="referrer">
                紹介者名
                <span class="form__required">※必須</span>
              </label>
              <input
                class="form__input"
                type="text"
                id="referrer"
                name="referrer"
                placeholder="ご紹介者のお名前"
                required
              >
            </div>

            <div class="form__group">
              <label class="form__label" for="message">
                備考
              </label>
              <textarea
                class="form__textarea"
                id="message"
                name="message"
                placeholder="ご質問・ご要望などございましたらご記入ください"
              ></textarea>
            </div>

            <button class="form__submit" type="submit">送信する</button>

            <p class="form__note">※ 送信後、確認メールが届かない場合はお手数ですが再度ご連絡ください。</p>
          </form>

          <div class="form__success" role="alert">
            <p class="t-h3" style="margin-bottom: 16px;">お問合せありがとうございます。</p>
            <p>内容を確認の上、折り返しご連絡いたします。</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__top">
        <div class="footer__logo">
          <img src="../kanasa_logo_yoko_w.png" alt="KANASA Conditioning Studio" width="200" height="48" loading="lazy">
        </div>
        <nav class="footer__nav" aria-label="フッターナビゲーション">
          <a href="/#introduction" class="footer__nav-link">Concept</a>
          <a href="/method/" class="footer__nav-link">Method</a>
          <a href="/#profile" class="footer__nav-link">Profile</a>
          <a href="/price/" class="footer__nav-link">Price</a>
          <a href="/journal/" class="footer__nav-link">Blog</a>
          <a href="/#voice" class="footer__nav-link">Voice</a>
          <a href="/#faq" class="footer__nav-link">FAQ</a>
          <a href="/contact/" class="footer__nav-link">Contact</a>
        </nav>
      </div>
      <p class="footer__tagline">紹介制・会員制・住所非公開</p>
      <p class="footer__copyright">&copy; 2026 KANASA Conditioning Studio.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
